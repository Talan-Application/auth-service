syntax = "proto3";

package auth.v1;

option go_package = "github.com/Talan-Application/proto-generation/auth/v1;authv1";

service AuthService {
  rpc Register(RegisterRequest) returns (OTPSentResponse);
  rpc Login(LoginRequest) returns (OTPSentResponse);
  rpc RefreshToken(RefreshTokenRequest) returns (AuthResponse);
  rpc ValidateToken(ValidateTokenRequest) returns (ValidateTokenResponse);
  rpc VerifyEmail(VerifyCodeRequest) returns (AuthResponse);
  rpc VerifyLoginCode(VerifyCodeRequest) returns (AuthResponse);
}

message RegisterRequest {
  string email = 1;
  string password = 2;
  string first_name = 3;
  string last_name = 4;
  optional string middle_name = 5;
}

message LoginRequest {
  string email = 1;
  string password = 2;
}

message VerifyCodeRequest {
  string email = 1;
  string code = 2;
}

message RefreshTokenRequest {
  string refresh_token = 1;
}

message ValidateTokenRequest {
  string access_token = 1;
}

message AuthResponse {
  string access_token = 1;
  string refresh_token = 2;
}

message OTPSentResponse {
  string message = 1;
}

message ValidateTokenResponse {
  int64  user_id = 1;
  string email   = 2;
  string role    = 3;
}
